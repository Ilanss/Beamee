<div class="wrapper h-full">
  <div class="sidebar menu menu-xs w-full flex flex-col min-h-0 bg-base-200">
    <img src="img/beamee-logo.png" alt="" class="object-contain h-10 object-left">
    <div class="library flex flex-col flex-1 min-h-0">
      <label id="library-search-wrap"
        class="flex items-center my-2  input input-sm input-border flex w-auto items-center gap-2">
        <input id="library-search" type="text" placeholder="Search" class="w-full h-full outline-none text-sm">
        <div id="search-icon" class="h-full flex items-center">

          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 30 30" fill="currentColor">
            <path
              d="M13 3C7.489 3 3 7.489 3 13s4.489 10 10 10a9.95 9.95 0 0 0 6.322-2.264l5.971 5.971a1 1 0 1 0 1.414-1.414l-5.97-5.97A9.95 9.95 0 0 0 23 13c0-5.511-4.489-10-10-10m0 2c4.43 0 8 3.57 8 8s-3.57 8-8 8-8-3.57-8-8 3.57-8 8-8" />
          </svg>
        </div>
      </label>
      <div id="library-title" class="flex justify-between items-center gap-2 pb-2">
        <h2 class="prose">Library</h2>
        <a id="create-song" class="hover:cursor-pointer tooltip tooltip-right" data-tip="Create a song">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m3.75 9v6m3-3H9m1.5-12H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </a>


      </div>
      <div id="library-list" class="overflow-y-scroll min-h-0 flex-1 border-b border-base-300">
        <ul class=""></ul>
      </div>
    </div>
    <div class="favorites flex-none pt-4 h-1/4 min-h-0 flex flex-col">
      <div id="favorites-title" class="flex justify-between items-center pb-2">
        <h2 class="prose">Favorites</h2>
        <a id="create-playlist" class="hover:cursor-pointer tooltip tooltip-right" data-tip="Create a new playlist">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
          </svg>
        </a>
      </div>
      <div id="favorites-list" class="overflow-y-scroll min-h-0 flex-1">
        <ul></ul>
      </div>
    </div>
  </div>
  <div id="verse-display" class="prose px-4">
    <div class="flex justify-between items-center gap-2 h-15">
      <h2 id="song-name" class="mt-0 mb-0"></h2>
      <h3 id="song-number" class="mb-0 font-thin text-sm"></h3>
    </div>
    <ul class="list-none p-0 mt-0">
      <li class="text-center pt-16 text-lg font-bold">
        <p><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="size-6 inline-block mr-3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>Select a song</p>
      </li>
    </ul>
  </div>
  <div id="preview-box" class="preview-box bg-base-200">
    <div id="preview" class="m-2 mb-6 overflow-hidden relative rounded-field"></div>
    <div class="mt-2 m-2 space-y-2">
      <fieldset class="">
        <label class="label">
          <input id="arrangement" type="checkbox" name="arrangement" checked class="checkbox" />
          Use arrangement
        </label>
      </fieldset>

  </div>
  <div id="editor-box" class="mb-0 overflow-y-scroll p-2 preview-box bg-base-200">
    <div id="editor-arrangement" class="overflow-hidden relative"></div>
    <hr class="mt-3">
  </div>
  <div id="projection-control-wrapper" class="controls flex items-center w-full py-2 px-2 border-t border-base-300">
    <div class="flex-1 flex justify-center items-center gap-2">
      <button id="prev-verse" class="btn btn-sm btn-circle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"

<template id="song-placeholder-template">
  <div class="text-center pt-16 text-lg font-bold">
    <p><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="size-6 inline-block mr-3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg><span data-role="label">Select a song</span></p>
  </div>
</template>

<template id="song-section-card-template">
  <li class="mb-3 border border-base-300 p-2 rounded-field">
    <div class="mb-2 flex items-center gap-2">
      <span class="section-drag-handle cursor-grab select-none" data-role="drag-handle">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
          <path fill-rule="evenodd"
            d="M6.97 2.47a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06L8.25 4.81V16.5a.75.75 0 0 1-1.5 0V4.81L3.53 8.03a.75.75 0 0 1-1.06-1.06l4.5-4.5Zm9.53 4.28a.75.75 0 0 1 .75.75v11.69l3.22-3.22a.75.75 0 1 1 1.06 1.06l-4.5 4.5a.75.75 0 0 1-1.06 0l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.22 3.22V7.5a.75.75 0 0 1 .75-.75Z"
            clip-rule="evenodd" />
        </svg>
      </span>
      <select class="select select-xs" data-role="type"></select>
      <input type="text" placeholder="Section title" class="input input-xs w-full" data-role="title">
      <button type="button" class="btn btn-xs btn-ghost ml-auto text-error round" data-role="remove">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="size-4">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>

      </button>
    </div>
    <textarea class="textarea min-h-32 w-full" data-role="text"></textarea>
  </li>
</template>

<template id="song-arrangement-item-template">
  <li class="mb-2 flex items-center gap-2">
    <span class="arrangement-drag-handle cursor-grab select-none" data-role="drag-handle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
        <path fill-rule="evenodd"
          d="M6.97 2.47a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06L8.25 4.81V16.5a.75.75 0 0 1-1.5 0V4.81L3.53 8.03a.75.75 0 0 1-1.06-1.06l4.5-4.5Zm9.53 4.28a.75.75 0 0 1 .75.75v11.69l3.22-3.22a.75.75 0 1 1 1.06 1.06l-4.5 4.5a.75.75 0 0 1-1.06 0l-4.5-4.5a.75.75 0 1 1 1.06-1.06l3.22 3.22V7.5a.75.75 0 0 1 .75-.75Z"
          clip-rule="evenodd" />
      </svg>
    </span>
    <select class="select select-xs flex-1" data-role="section"></select>
    <button type="button" class="btn btn-xs btn-ghost text-error" data-role="remove">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="size-4">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
      </svg>

    </button>
  </li>
</template>

<template id="song-arrangement-add-template">
  <button type="button" class="btn btn-sm btn-outline mt-3" data-role="add">+ Add arrangement item</button>
</template>

<template id="song-collection-editor-template">
  <div class="space-y-3 mt-3">
    <div class="space-y-2" data-role="collection-row">
      <select class="select select-sm w-full" data-role="selector"></select>
      <input type="text" placeholder="Collection name" class="input input-sm w-full" data-role="name">
      <input type="text" placeholder="Collection id" class="input input-sm w-full" data-role="id">
      <p class="text-xs opacity-70" data-role="helper">Leave id empty to generate from the name.</p>
      <input type="text" placeholder="Collection number" class="input input-sm w-full" data-role="number">
      <button type="button" class="btn btn-xs btn-ghost text-error self-start" data-role="remove-collection">
        Remove collection
      </button>
    </div>
    <div class="flex gap-2 py-4" data-role="actions">
      <button type="button" class="btn btn-sm btn-primary" data-role="save">Save</button>
      <button type="button" class="btn btn-sm btn-ghost" data-role="cancel">Cancel</button>
    </div>
  </div>
</template>
