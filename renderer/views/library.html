<div class="wrapper h-full">
  <div class="sidebar menu menu-xs bg-base-200 w-full max-w-xs flex flex-col min-h-0">
    <img src="img/beamee-logo.png" alt="" class="object-contain h-10 object-left mb-2">
    <div class="library flex flex-col flex-1 min-h-0">
      <div id="library-search-wrap"
        class="flex items-center border px-3 gap-1 border-gray-500/30 h-8 rounded-full overflow-hidden max-w-md w-full my-2">
        <input id="library-search" type="text" placeholder="Search"
          class="w-full h-full outline-none text-gray-500 bg-transparent placeholder-gray-500 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 30 30" fill="#6B7280">
          <path
            d="M13 3C7.489 3 3 7.489 3 13s4.489 10 10 10a9.95 9.95 0 0 0 6.322-2.264l5.971 5.971a1 1 0 1 0 1.414-1.414l-5.97-5.97A9.95 9.95 0 0 0 23 13c0-5.511-4.489-10-10-10m0 2c4.43 0 8 3.57 8 8s-3.57 8-8 8-8-3.57-8-8 3.57-8 8-8" />
        </svg>
      </div>
      <div id="library-title" class="flex justify-between items-center gap-2 pb-2">
        <h2 class="prose">Library</h2>
        <a id="create-song-folder" class="hover:cursor-pointer tooltip tooltip-right" data-tip="Create a song folder">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
          </svg>
        </a>


      </div>
      <div id="library-list" class="overflow-y-scroll min-h-0 flex-1">
        <ul class=""></ul>
      </div>
    </div>
    <div class="favorites flex-none pt-4 h-1/4 min-h-0 flex flex-col">
      <div id="favorites-title" class="flex justify-between items-center pb-2">
        <h2 class="prose">Favorites</h2>
        <a id="create-playlist" class="hover:cursor-pointer tooltip tooltip-right" data-tip="Create a new playlist">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" class="h-4 w-4">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 10.5v6m3-3H9m4.06-7.19-2.12-2.12a1.5 1.5 0 0 0-1.061-.44H4.5A2.25 2.25 0 0 0 2.25 6v12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9a2.25 2.25 0 0 0-2.25-2.25h-5.379a1.5 1.5 0 0 1-1.06-.44Z" />
          </svg>
        </a>
      </div>
      <div id="favorites-list" class="overflow-y-scroll min-h-0 flex-1">
        <ul></ul>
      </div>
    </div>
  </div>
  <div id="verse-display" class="prose px-4">
    <h2 id="song-name" class="my-4"></h2>
    <ul class="list-none p-0">
      <li class="text-center pt-16 text-lg font-bold">
        <p><i class="bi bi-arrow-left pr-3"></i>Select a song</p>
      </li>
    </ul>
  </div>
  <div id="preview-box" class="preview-box">
    <div id="preview" class="bg-neutral-900 text-white rounded-md m-2 overflow-hidden relative"></div>
    <div class="mt-10 space-y-10">
      <fieldset>
        <div class="mt-6 space-y-6">
          <div class="flex gap-3">
            <div class="flex h-6 shrink-0 items-center">
              <div class="group grid size-4 grid-cols-1">
                <input id="arrangement" type="checkbox" name="arrangement" checked aria-describedby="arrangement-description"
                  class="col-start-1 row-start-1 appearance-none rounded-sm border border-white/10 bg-white/5 checked:border-indigo-500 checked:bg-indigo-500 indeterminate:border-indigo-500 indeterminate:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500 disabled:border-white/5 disabled:bg-white/10 disabled:checked:bg-white/10 forced-colors:appearance-auto" />
                <svg viewBox="0 0 14 14" fill="none"
                  class="pointer-events-none col-start-1 row-start-1 size-3.5 self-center justify-self-center stroke-white group-has-disabled:stroke-white/25">
                  <path d="M3 8L6 11L11 3.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="opacity-0 group-has-checked:opacity-100" />
                  <path d="M3 7H11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="opacity-0 group-has-indeterminate:opacity-100" />
                </svg>
              </div>
            </div>
            <div class="text-sm/6">
              <label for="arrangement" class="font-medium text-white">Use arrangement</label>
            </div>
          </div>
        </div>
      </fieldset>
    </div>

  </div>
  <div class="controls flex items-center w-full py-2 px-2 border-t dark:border-neutral-700">
    <div class="flex-1 flex justify-center items-center gap-2">
      <button id="prev-verse" class="btn btn-sm btn-circle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
          fill="currentColor" class="size-4">
          <path
            d="M8.5 4.75a.75.75 0 0 0-1.107-.66l-6 3.25a.75.75 0 0 0 0 1.32l6 3.25a.75.75 0 0 0 1.107-.66V8.988l5.393 2.921A.75.75 0 0 0 15 11.25v-6.5a.75.75 0 0 0-1.107-.66L8.5 7.013V4.75Z" />
        </svg>
      </button>
      <button id="toggle-projection" class="btn btn-circle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
          fill="currentColor" class="size-4">
          <path
            d="M3 3.732a1.5 1.5 0 0 1 2.305-1.265l6.706 4.267a1.5 1.5 0 0 1 0 2.531l-6.706 4.268A1.5 1.5 0 0 1 3 12.267V3.732Z" />
        </svg>
      </button>
      <button id="next-verse" class="btn btn-sm btn-circle"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"
          fill="currentColor" class="size-4">
          <path
            d="M2.53 3.956A1 1 0 0 0 1 4.804v6.392a1 1 0 0 0 1.53.848l5.113-3.196c.16-.1.279-.233.357-.383v2.73a1 1 0 0 0 1.53.849l5.113-3.196a1 1 0 0 0 0-1.696L9.53 3.956A1 1 0 0 0 8 4.804v2.731a.992.992 0 0 0-.357-.383L2.53 3.956Z" />
        </svg>
      </button>
      <button id="black-screen" class="btn btn-sm btn-circle"><svg xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 16 16" fill="currentColor" class="size-4">
          <path fill-rule="evenodd"
            d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l10.5 10.5a.75.75 0 1 0 1.06-1.06l-1.322-1.323a7.012 7.012 0 0 0 2.16-3.11.87.87 0 0 0 0-.567A7.003 7.003 0 0 0 4.82 3.76l-1.54-1.54Zm3.196 3.195 1.135 1.136A1.502 1.502 0 0 1 9.45 8.389l1.136 1.135a3 3 0 0 0-4.109-4.109Z"
            clip-rule="evenodd" />
          <path
            d="m7.812 10.994 1.816 1.816A7.003 7.003 0 0 1 1.38 8.28a.87.87 0 0 1 0-.566 6.985 6.985 0 0 1 1.113-2.039l2.513 2.513a3 3 0 0 0 2.806 2.806Z" />
        </svg>
      </button>
    </div>
    <div>
      <button id="settings" data-route="settings" class="btn btn-sm btn-circle"><svg xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path fill-rule="evenodd"
            d="M11.078 2.25c-.917 0-1.699.663-1.85 1.567L9.05 4.889c-.02.12-.115.26-.297.348a7.493 7.493 0 0 0-.986.57c-.166.115-.334.126-.45.083L6.3 5.508a1.875 1.875 0 0 0-2.282.819l-.922 1.597a1.875 1.875 0 0 0 .432 2.385l.84.692c.095.078.17.229.154.43a7.598 7.598 0 0 0 0 1.139c.015.2-.059.352-.153.43l-.841.692a1.875 1.875 0 0 0-.432 2.385l.922 1.597a1.875 1.875 0 0 0 2.282.818l1.019-.382c.115-.043.283-.031.45.082.312.214.641.405.985.57.182.088.277.228.297.35l.178 1.071c.151.904.933 1.567 1.85 1.567h1.844c.916 0 1.699-.663 1.85-1.567l.178-1.072c.02-.12.114-.26.297-.349.344-.165.673-.356.985-.57.167-.114.335-.125.45-.082l1.02.382a1.875 1.875 0 0 0 2.28-.819l.923-1.597a1.875 1.875 0 0 0-.432-2.385l-.84-.692c-.095-.078-.17-.229-.154-.43a7.614 7.614 0 0 0 0-1.139c-.016-.2.059-.352.153-.43l.84-.692c.708-.582.891-1.59.433-2.385l-.922-1.597a1.875 1.875 0 0 0-2.282-.818l-1.02.382c-.114.043-.282.031-.449-.083a7.49 7.49 0 0 0-.985-.57c-.183-.087-.277-.227-.297-.348l-.179-1.072a1.875 1.875 0 0 0-1.85-1.567h-1.843ZM12 15.75a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </div>
</div>
