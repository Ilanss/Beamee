<section class="h-full overflow-auto bg-slate-50 px-4 py-5 text-slate-900 sm:px-6">
  <div class="mb-4 flex items-center justify-between gap-3">
    <div>
      <p class="text-sm uppercase tracking-wide text-slate-500">App</p>
      <h2 class="text-xl font-semibold">Preferences</h2>
    </div>
    <button type="button" data-route="library" class="rounded-md bg-slate-200 px-4 py-2 font-medium text-slate-900">Back</button>
  </div>

  <form id="preferences-form" class="grid max-w-2xl gap-3">
    <div class="grid gap-1.5">
      <label for="font-family" class="font-medium">Font Family</label>
      <select id="font-family" name="font-family" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2"></select>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      <div class="grid gap-1.5">
        <label for="font-size" class="font-medium">Font Size</label>
        <input type="number" id="font-size" name="font-size" min="10" max="200" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
      <div class="grid gap-1.5">
        <label for="line-height" class="font-medium">Line Height</label>
        <input type="number" id="line-height" name="line-height" min="0.5" max="3" step="0.1" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      <div class="grid gap-1.5">
        <label for="text-color" class="font-medium">Text Color</label>
        <input type="color" id="text-color" name="text-color" class="h-11 w-full rounded-md border border-slate-300 bg-white p-1">
      </div>
      <div class="grid gap-1.5">
        <label for="background-color" class="font-medium">Background Color</label>
        <input type="color" id="background-color" name="background-color" class="h-11 w-full rounded-md border border-slate-300 bg-white p-1">
      </div>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      <div class="grid gap-1.5">
        <label for="padding-top" class="font-medium">Padding Top</label>
        <input type="number" id="padding-top" name="padding-top" min="0" max="200" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
      <div class="grid gap-1.5">
        <label for="padding-bottom" class="font-medium">Padding Bottom</label>
        <input type="number" id="padding-bottom" name="padding-bottom" min="0" max="200" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
    </div>

    <div class="grid gap-3 sm:grid-cols-2">
      <div class="grid gap-1.5">
        <label for="padding-left" class="font-medium">Padding Left</label>
        <input type="number" id="padding-left" name="padding-left" min="0" max="200" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
      <div class="grid gap-1.5">
        <label for="padding-right" class="font-medium">Padding Right</label>
        <input type="number" id="padding-right" name="padding-right" min="0" max="200" class="w-full rounded-md border border-slate-300 bg-white px-3 py-2">
      </div>
    </div>

    <div class="flex flex-wrap gap-2 pt-1">
      <button type="submit" class="rounded-md bg-blue-600 px-4 py-2 font-medium text-white">Save Preferences</button>
      <button type="reset" class="rounded-md bg-slate-200 px-4 py-2 font-medium text-slate-900">Reset</button>
      <button type="button" id="restore-defaults" class="rounded-md bg-slate-900 px-4 py-2 font-medium text-white">Restore Defaults</button>
    </div>
  </form>
  <p id="preferences-status" class="mt-3 min-h-5" aria-live="polite"></p>
</section>
