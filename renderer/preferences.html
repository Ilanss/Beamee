<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline'" />
  <title>Preferences</title>
  <link rel="stylesheet" href="css/output.css">
</head>
<body>
  <h2>Preferences</h2>
  <form id="preferences-form">
    <label for="font-family">Font Family:</label>
    <select id="font-family" name="font-family">
      <!-- Les polices de caractères seront ajoutées dynamiquement via JavaScript -->
    </select>
    <br>
    <label for="font-size">Font Size:</label>
    <input type="number" id="font-size" name="font-size" min="10" max="72">
    <br>
    <label for="text-color">Text Color:</label>
    <input type="color" id="text-color" name="text-color">
    <br>
    <label for="background-color">Background Color:</label>
    <input type="color" id="background-color" name="background-color">
    <br>
    <button type="submit">Save Preferences</button>
    <button type="reset">Reset</button>
  </form>
  <script src="js/preferences.js"></script>
</body>
</html>
